<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Click the Dot - HelloWorld</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Click the Dot</h1>
    <p id="description">Click the moving dots to score points. You have 30 seconds — try to get the highest score!</p>

    <div id="game-area">
      <!-- Dots will be inserted here -->
    </div>

    <div id="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="time">30</span>s</div>
      <button id="start">Start Game</button>
      <button id="restart" style="display:none">Play Again</button>
    </div>

    <footer>
      <p>Simple browser game added to the HelloWorld repo.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
